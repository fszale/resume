name: Resume Sync

on:
  push:
    paths:
      - "README.md"
      - "scripts/**"
      - "typst/**"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Typst
        run: |
          TYPST_VERSION=0.14.2
          curl -L "https://github.com/typst/typst/releases/download/v${TYPST_VERSION}/typst-x86_64-unknown-linux-musl.tar.xz" -o /tmp/typst.tar.xz
          tar -xJf /tmp/typst.tar.xz -C /tmp
          echo "/tmp/typst-x86_64-unknown-linux-musl" >> "$GITHUB_PATH"

      - name: Rebuild Resume Artifacts
        run: node scripts/build_resume.mjs --typst-bin typst

      - name: Commit Generated Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Brief_Resume.MD \
            filip_szalewicz_resume.pdf \
            Brief_Resume_Filip_Szalewicz.pdf \
            filip_szalewicz_resume_human.pdf \
            Brief_Resume_Filip_Szalewicz_human.pdf \
            typst/generated/*.typ

          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi

          git commit -m "chore: sync resume outputs"
          git push
