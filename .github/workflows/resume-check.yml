name: Resume Check

on:
  pull_request:
    paths:
      - "README.md"
      - "scripts/**"
      - "typst/**"
      - ".github/workflows/**"
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Typst
        run: |
          TYPST_VERSION=0.14.2
          curl -L "https://github.com/typst/typst/releases/download/v${TYPST_VERSION}/typst-x86_64-unknown-linux-musl.tar.xz" -o /tmp/typst.tar.xz
          tar -xJf /tmp/typst.tar.xz -C /tmp
          echo "/tmp/typst-x86_64-unknown-linux-musl" >> "$GITHUB_PATH"

      - name: Rebuild Resume Artifacts
        run: node scripts/build_resume.mjs --typst-bin typst

      - name: Verify Generated Files Are Committed
        run: |
          git status --short
          git diff --exit-code
